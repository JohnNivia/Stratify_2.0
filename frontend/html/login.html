<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Good Morning</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        
        <div class="login-illustration">
            <div class="illustration-content">
                <p class="main-tip">Login your Account to get full User Experience</p>
                <p class="sub-tip">Tip: Upgrade your Account to get access Premium Features</p>
            </div>
        </div>

        <div class="login-form-section">
            <div class="form-wrapper">
                <header class="form-header">
                    <h2>Hello!</h2>
                    <h1>Good Morning</h1>
                </header>

                <form class="login-form">
                    <h3><span>Login</span> your account</h3>

                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required autocomplete="off">
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>

                    <div class="forgot-password-container">
                        <a href="#" class="forgot-password">forget password?</a>
                    </div>

                    <button type="submit" class="btn-login">Login</button>

                    <div class="create-account-container">
                        <a href="#" class="create-account">Create Account</a>
                    </div>
                </form>
            </div>
        </div>

    </div>

</body>
</html>
